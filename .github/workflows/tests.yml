name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  structural-compliance:
    name: Structural compliance (protective docs + vendored anchors)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify protective documents
        run: |
          for f in docs/endorsement_marker.md docs/stewardship_conflict.md \
                   docs/do_not_cite_as.md docs/validity_envelope.md \
                   docs/benchmark_protocol.md; do
            if [ ! -f "$f" ]; then
              echo "FAIL: mandatory protective document missing: $f"
              echo "      Sail v0.4 §11 requires this file at HEAD."
              exit 1
            fi
          done
          echo "PASS: all five protective documents present."
      - name: Verify vendored Ledger
        run: |
          for f in ledger/CL-2026-005_v0.4.md \
                   ledger/CL-2026-005_v0.4_council-briefing.md \
                   ledger/CL-2026-005_v0.4_council-deliberation_2026-04-29.md; do
            if [ ! -f "$f" ]; then
              echo "FAIL: vendored Ledger artefact missing: $f"
              exit 1
            fi
          done
          echo "PASS: vendored Ledger artefacts present."
      - name: Verify vendored Sail
        run: |
          if [ ! -f "sail/sail-cbg-pipeline_v0.4.md" ]; then
            echo "FAIL: vendored Sail v0.4 missing"
            exit 1
          fi
          echo "PASS: vendored Sail v0.4 present."

  python-tests:
    name: Python smoke tests
    runs-on: ubuntu-latest
    needs: structural-compliance
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install numpy scipy pyyaml pytest
      - name: Run smoke tests
        run: |
          python -m pytest tests/ -v
