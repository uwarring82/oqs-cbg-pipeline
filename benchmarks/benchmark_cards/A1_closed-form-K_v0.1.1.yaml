# DG-1 Benchmark Card A1 — Operational expression for K(t)
#
# Anchor: CL-2026-005 v0.4 Entry 1; Letter Eqs. (6)-(7); SCHEMA.md v0.1.2;
#         DG-1 work plan v0.1.3 (active)
# Phase: B (frozen-awaiting-run)
#
# This card verifies that the basis-independent closed-form recipe
#   K = (1/2id) sum_alpha [F_alpha^dagger, L[F_alpha]]
# (Letter Eq. (6); matrix-unit form Letter Eq. (7)) applied to two
# representative L specifications reproduces the analytically-known K for
# each case: Entry 1.B.1 (canonical Lindblad with traceless jumps recovers
# the input H term) and Entry 1.B.2 (Markovian weak-coupling generator
# reproduces the standard Lamb shift).
#
# Entry 1.B.3 (pseudo-Kraus reduction to the diagonal Hayden-Sorce 2022
# expression) is deferred to DG-2 per DG-1 work plan v0.1.3 §1.1: the
# Hayden-Sorce 2022 closed form is not transcribed in the Letter or Ledger
# paraphrase, and the steward does not have access to the paper directly,
# so no numerical comparison is possible at DG-1. The deferral was
# surfaced by Phase B preview drafting of Card A1 v0.1.0; see
# failure_mode_log entry below.
#
# model_kind: algebraic_map (Entry 1 is a closed-form L -> K identity, not
# a dynamical evolution; verification is at a single instant; perturbative
# order is 0 per DG-1 work plan v0.1.3 §1.2).

# ─── Top-level metadata ───────────────────────────────────────────────────────

schema_version: "v0.1.2"
card_id: "A1"
version: "v0.1.1"
date: "2026-04-30"
dg_target: "DG-1"
ledger_entry: "CL-2026-005 v0.4 Entry 1"
model: "closed_form_algebraic"
status: "pass"
supersedes: "A1_closed-form-K_v0.1.0.yaml"
license: "CC-BY-4.0 (LICENSE-docs)"

# ─── Gauge block ──────────────────────────────────────────────────────────────

gauge:
  gauge: "hayden-sorce-minimal-dissipation"
  coordinate_dependent: true
  direct_observable: false
  gauge_alignment_required_for_comparison:
    - "hmf"
    - "polaron"
    - "mori"

# ─── Frozen parameters ────────────────────────────────────────────────────────

frozen_parameters:

  model:
    model_kind: "algebraic_map"
    system_dimension: 2

    # The system-side scaffolding (system_hamiltonian, coupling_operator,
    # bath_type, bath_spectral_density, bath_state) is omitted per
    # SCHEMA.md §Algebraic-map cards: each test case fixes its own L.

    test_cases:

      - name: "canonical_lindblad_traceless"
        description: |
          Canonical Lindblad form with traceless jump operators. The
          recipe should return the input H term exactly; the dissipator's
          traceless jump operators contribute zero Hamiltonian part.
        hamiltonian_term: "(omega / 2) * sigma_z"
        jump_operators:
          - "sqrt(gamma_minus) * sigma_minus"
          - "sqrt(gamma_plus)  * sigma_plus"
        parameters:
          omega: 1.0           # dimensionless; sets the energy scale
          gamma_minus: 0.1     # downward dissipation rate (omega-units)
          gamma_plus: 0.05     # upward (thermal-excitation) rate (omega-units)
        expected_outcome: |
          K = (omega / 2) * sigma_z  (the input Hamiltonian term recovered
          exactly via Letter Eq. (6) applied to the canonical Lindblad L).
        reference: "Letter Eq. (6); CL-2026-005 v0.4 Entry 1.B.1"

      - name: "markovian_weak_coupling_lamb_shift"
        description: |
          Markovian weak-coupling generator with explicit Lamb-shift
          correction added to the system Hamiltonian. The recipe should
          recover H_S + H_LS, reproducing the textbook weak-coupling
          result (Breuer-Petruccione §3.3).
        hamiltonian_term: "((omega + 2 * delta_LS) / 2) * sigma_z"
        # The total coherent term is H_S + H_LS where H_S = (omega/2)*sigma_z
        # and H_LS = delta_LS * sigma_z. Both are folded into a single
        # `hamiltonian_term` per the Lindblad-form convention.
        jump_operators:
          - "sqrt(gamma) * sigma_minus"
        parameters:
          omega: 1.0           # bare system energy (dimensionless)
          delta_LS: 0.01       # Lamb-shift correction (omega-units; small)
          gamma: 0.1           # weak-coupling dissipation rate (omega-units)
        expected_outcome: |
          K = ((omega + 2 * delta_LS) / 2) * sigma_z
            = (omega / 2) * sigma_z + delta_LS * sigma_z
          (the system Hamiltonian plus the standard Lamb-shift correction).
        reference: "Letter Eq. (6); CL-2026-005 v0.4 Entry 1.B.2; Breuer-Petruccione §3.3"

      # NB: Card A1 v0.1.0 included a third test case (pseudo_kraus_diagonal)
      # for Entry 1.B.3. Removed in this revision; see failure_mode_log
      # entry below for rationale and the DG-2 deferral.

  truncation:
    perturbative_order: 0      # algebraic identity; no perturbative recursion
    basis: "matrix_unit"       # Letter Eq. (7) form; cross-basis verification is DG-2

  numerical:
    # time_grid omitted: model_kind == algebraic_map (single-instant verification).
    integration_tolerance:
      # Solver is "analytical"; these tolerances apply to numerical round-off
      # in the closed-form evaluation (matrix products, basis sums). The
      # actual acceptance gate is the comparison threshold below (1.0e-10);
      # these are deliberately tighter so round-off is not the dominant error.
      relative: 1.0e-12
      absolute: 1.0e-14
    solver: "analytical"

  comparison:
    reference: "Letter Eqs. (6)-(7); CL-2026-005 v0.4 Entry 1.A; per-case anchors in frozen_parameters.model.test_cases[i].reference"
    target_observable: "K"
    error_metric: "relative_frobenius"
    threshold: 1.0e-10

# ─── Acceptance criterion ─────────────────────────────────────────────────────

acceptance_criterion:
  reference: "Letter Eqs. (6)-(7); CL-2026-005 v0.4 Entry 1"
  observable: "K"
  error_metric: "relative_frobenius"
  threshold: 1.0e-10
  projection_scheme: null
  rationale: |
    PASS iff every test case in frozen_parameters.model.test_cases satisfies

      ||K_computed - K_expected||_F / ||K_expected||_F <= 1.0e-10,

    where K_computed is obtained by applying Letter Eq. (7) (the
    matrix-unit form of the basis-independent recipe Letter Eq. (6))
    to that case's L, and K_expected is the analytically-known result
    for that L.

    Per-case PASS conditions, mapped to Entry 1.B sub-claims:

      - canonical_lindblad_traceless (Entry 1.B.1): K_expected equals
        the input Hamiltonian term (omega/2)*sigma_z exactly. Failure
        would indicate the recipe spuriously absorbs part of the
        traceless dissipator into the Hamiltonian sector.

      - markovian_weak_coupling_lamb_shift (Entry 1.B.2): K_expected
        equals the input Hamiltonian term plus the Lamb-shift
        correction, reproducing the textbook weak-coupling result.
        Failure would indicate a systematic mismatch with the
        Breuer-Petruccione §3.3 form.

    Both are independent algebraic checks at the single instant
    Letter Eq. (6) defines; N_card = 0 per DG-1 work plan v0.1.3 §1.2.
    The bounded-maximalist reading (plan §1.1) requires every Entry
    1.B sub-claim to be exercised that *can be operationalised with
    the resources at hand*; B.1 and B.2 are exercised here, and
    Entry 1.B.3 is deferred to DG-2 (see Out-of-scope below and the
    failure_mode_log entry).

    Out of scope for Card A1 v0.1.1 (DG-1 boundary):
      - Entry 1.B.3 (pseudo-Kraus reduction to diagonal Hayden-Sorce
        2022 expression): deferred to DG-2 per DG-1 work plan v0.1.3
        §1.1. The Hayden-Sorce 2022 closed form is not transcribed in
        the Letter or Ledger paraphrase, and the steward does not have
        access to the paper directly; no numerical comparison is
        possible until the prior-art formula is transcribed. See
        failure_mode_log[0] below.
      - Off-diagonal pseudo-Kraus (omega_{ij}, i != j): the new formula's
        generalisation claim per Entry 1.D. Verification of the
        generalisation is a structural-extension check that belongs to
        DG-2, not DG-1 (would also benefit from the Hayden-Sorce 2022
        transcription).
      - Cross-basis verification (evaluating K in a non-matrix-unit
        Hilbert-Schmidt orthonormal basis and asserting agreement):
        DG-2 universal-default structural-identity check per Sail v0.5
        §9 DG-2 and DG-1 work plan v0.1.3 §2.1.
      - Cross-dimension verification: DG-1 work plan v0.1.3 §4 Phase B
        Card A1 lists d in {2, 3} as illustrative scaffolding. This
        card freezes d = 2 (the minimal non-trivial case, matching the
        qubit scope of Cards A3/A4); d = 3 is deferred to DG-2 as a
        cross-dimension structural-identity check. The algebraic
        identity Letter Eq. (6) is dimension-independent in principle,
        so d = 2 verifies the structure; d = 3 would verify robustness.
      - Higher-order perturbative recursion: Entry 1 is order-0 by
        construction (closed-form algebraic identity).

# ─── Result block ─────────────────────────────────────────────────────────────

result:
  verdict: "PASS"
  evidence:
    - "benchmarks/results/A1_closed-form-K_v0.1.1_result.json"
  commit_hash: ""
  runner_version: "0.1.0"
  notes: |
    Verdict computed by reporting.benchmark_card.run_card via the
    algebraic_map handler registry; both test_cases (canonical_lindblad_traceless,
    markovian_weak_coupling_lamb_shift) returned error = 0.0 (machine
    precision; well below the 1.0e-10 threshold). Entry 1.B.1 and 1.B.2
    structural predictions reproduced. Re-runnable via
    `python scripts/run_dg1_verdict.py`.

# ─── Failure-mode log ─────────────────────────────────────────────────────────

failure_mode_log:
  - date: "2026-04-30"
    change: |
      Removed test case "pseudo_kraus_diagonal" (Entry 1.B.3 verification).
      Card A1 v0.1.1 verifies Entry 1.B.1 and 1.B.2 only.
    reason: |
      Phase B preview drafting of Card A1 v0.1.0 surfaced an unverifiable
      expected_outcome for the pseudo_kraus_diagonal test case.

      Card A1 v0.1.0 stated K_expected was "K proportional to
      (omega_11 - omega_22) * sigma_z up to the gauge-fixed coefficient"
      based on the Hayden-Sorce 2022 diagonal pseudo-Kraus form. During
      DG-1 Phase C.3 (cbg.effective_hamiltonian.K_from_generator
      implemented and tested at commit 09714cf), a numerical sanity check
      revealed:

        - The pseudo-Kraus L as written in v0.1.0
          (L[X] = sum_i omega_ii V_i X V_i^dagger, no anti-commutator)
          is NOT trace-annihilating: Tr(L(E_00)) = omega_22 ≠ 0. Letter
          Eq. (6) precondition violated. Application of Letter Eq. (6)
          to this L numerically yields K = 0, not the (omega_11 - omega_22)
          sigma_z form claimed by v0.1.0.
        - Adding the canonical anti-commutator term to make L trace-
          annihilating still yields K = 0 via Letter Eq. (6) (consistent
          with Entry 1.B.1: a pure dissipator with traceless jumps
          contributes zero to K).
        - The (omega_11 - omega_22) sigma_z claim in v0.1.0 was a
          speculative reading of the Ledger Entry 1.B.3 paraphrase
          ("K reduces to the diagonal Hayden-Sorce 2022 expression"),
          not a transcription of the actual Hayden-Sorce 2022 closed
          form (Hayden, Sorce, Communications Physics 5, 92 (2022)).

      The verification of Entry 1.B.3 ("the new formula generalises
      the prior result to the off-diagonal case") requires the
      Hayden-Sorce 2022 closed form for the diagonal pseudo-Kraus
      input. The steward does not have direct access to that paper at
      the time of this revision; without the prior-art formula, no
      numerical comparison is possible.

      The bounded-maximalist reading (DG-1 work plan v0.1.3 §1.1) is
      bounded by what can be operationalised with the resources at
      hand. Entry 1.B.3's verification depends on inaccessible prior
      art and is therefore deferred to DG-2 — paralleling the Entry 5
      deferral (where a similar resource constraint applies to the
      parity-FDT decomposition). The deferral is bounded: it covers
      only Entry 1.B.3, not the entire Entry 1; Entry 1.B.1 and 1.B.2
      remain DG-1 territory.

      Routing: this is a steward-side scope adjustment per DG-1 work
      plan v0.1.3 §1.1. It does not bear on the Ledger (the Ledger's
      Entry 1.B.3 claim is not invalidated; it is simply not gated by
      DG-1 of this repository). No Council deliberation is required.
    predecessor_card_id: "A1"
    predecessor_version: "v0.1.0"

