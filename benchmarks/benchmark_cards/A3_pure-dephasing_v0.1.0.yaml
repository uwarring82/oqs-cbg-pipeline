# DG-1 Benchmark Card A3 — Pure dephasing structural result
#
# Anchor: CL-2026-005 v0.4 Entry 3; Letter Eq. (19), Letter Appendix D;
#         SCHEMA.md v0.1.2
# Phase: B (frozen-awaiting-run) per DG-1 work plan v0.1.2 §4 Phase B
#
# This card verifies that under pure-dephasing dynamics (H_S = (omega/2)*sigma_z,
# A = sigma_z, bosonic linear coupling), the effective Hamiltonian K(t) computed
# by the TCL recursion at orders <= 2 satisfies Entry 3.B sub-claims:
#   B.1: K(t) ∝ sigma_z (no environment-induced eigenbasis rotation), in BOTH
#        thermal AND non-thermal bath states.
#   B.2: For thermal bosonic bath: K(t) = (omega/2)*sigma_z exactly, no
#        renormalisation, recovering the standard spin-boson exact result
#        (Łuczka 1990; Doll et al. 2008; Leggett et al. 1987).
#   B.3: For coherently-displaced bath (odd-order cumulants nonzero):
#        omega_r(t) - omega ≠ 0 (time-dependent shift, second-order observable
#        per Letter Appendix D).
#
# model_kind: dynamical with test_cases (parameter sweep over bath_state).
# perturbative_order: 2 (N_card per DG-1 work plan v0.1.2 §1.2; B.3 manifests
# at second order, B.1/B.2 hold at every order ≤ 2).

# ─── Top-level metadata ───────────────────────────────────────────────────────

schema_version: "v0.1.2"
card_id: "A3"
version: "v0.1.0"
date: "2026-04-30"
dg_target: "DG-1"
ledger_entry: "CL-2026-005 v0.4 Entry 3"
model: "pure_dephasing"
status: "frozen-awaiting-run"
license: "CC-BY-4.0 (LICENSE-docs)"

# ─── Gauge block ──────────────────────────────────────────────────────────────

gauge:
  gauge: "hayden-sorce-minimal-dissipation"
  coordinate_dependent: true
  direct_observable: false
  gauge_alignment_required_for_comparison:
    - "hmf"
    - "polaron"
    - "mori"

# ─── Frozen parameters ────────────────────────────────────────────────────────

frozen_parameters:

  model:
    model_kind: "dynamical"
    system_dimension: 2
    system_hamiltonian: "(omega / 2) * sigma_z"
    coupling_operator: "sigma_z"
    bath_type: "bosonic_linear"
    bath_spectral_density:
      family: "ohmic"
      cutoff_frequency: 10.0       # omega-units (cutoff well above system frequency)
      coupling_strength: 0.05      # ohmic dimensionless coupling alpha (small; weak-coupling regime relative to N_card = 2)
    # bath_state omitted at model level: each test_case provides its own.
    test_cases:

      - name: "thermal_bath"
        description: |
          Bosonic bath in a thermal Fock-diagonal state at temperature
          T = 0.5 (omega-units, k_B T / hbar omega = 0.5). Odd-order bath
          cumulants vanish; B.1 + B.2 are the predictions to verify.
        bath_state:
          family: "thermal"
          temperature: 0.5            # k_B T / hbar omega = 0.5 (sub-system scale; non-trivial bath occupation)
        expected_outcome: |
          K(t) = (omega/2) * sigma_z exactly at every order 0 ≤ n ≤ N_card.
          No time-dependent shift (omega_r(t) - omega = 0 to numerical
          tolerance). No environment-induced eigenbasis rotation
          (K(t) is proportional to sigma_z within tolerance).
        verifies:
          - "Entry 3.B.1 (no eigenbasis rotation)"
          - "Entry 3.B.2 (thermal trivialisation; standard spin-boson exact result)"
        reference: "Letter Eq. (19); CL-2026-005 v0.4 Entry 3.B.1, 3.B.2; Łuczka 1990; Doll et al. 2008; Leggett et al. 1987"

      - name: "coherent_displaced_bath"
        description: |
          Bosonic bath in a coherently-displaced state with displacement
          amplitude alpha = 1.0 (one bath quantum in the coherent-state
          parameter sense). The displacement breaks the Fock-diagonal
          symmetry, introducing nonzero odd-order bath cumulants. B.1 + B.3
          are the predictions to verify.
        bath_state:
          family: "coherent_displaced"
          temperature: 0.0            # vacuum baseline + displacement (displacement is the nontrivial input)
          displacement_amplitude: 1.0 # alpha = 1 (coherent-state amplitude in dimensionless units)
        expected_outcome: |
          K(t) = (omega_r(t)/2) * sigma_z, with omega_r(t) - omega ≠ 0
          (time-dependent, manifesting at second order in lambda per
          Letter Appendix D Eqs. (D.4)-(D.6) translated to the sigma_z
          coupling). No environment-induced eigenbasis rotation
          (K(t) is still proportional to sigma_z; the rotation discussed
          in Card A4 is specific to A = sigma_x).
        verifies:
          - "Entry 3.B.1 (no eigenbasis rotation; holds in both bath states)"
          - "Entry 3.B.3 (time-dependent shift in non-thermal bath)"
        reference: "Letter Eq. (19); Letter Appendix D; CL-2026-005 v0.4 Entry 3.B.1, 3.B.3"

  truncation:
    perturbative_order: 2          # N_card per DG-1 work plan v0.1.2 §1.2
    basis: "matrix_unit"           # cross-basis verification is DG-2
    bath_mode_cutoff: 1024         # discretisation of the continuous ohmic spectral density

  numerical:
    time_grid:
      t_start: 0.0                 # 1/omega units
      t_end: 20.0                  # 20 * (1/omega); long enough to resolve memory effects at T = 0.5
      n_points: 200                # 0.1 * (1/omega) spacing; resolves dynamics at the bath cutoff scale
      scheme: "uniform"
    integration_tolerance:
      relative: 1.0e-10
      absolute: 1.0e-12
    solver: "scipy_dop853"         # adaptive Runge-Kutta 8(5,3); standard high-order non-stiff solver

  comparison:
    reference: "Letter Eq. (19); Letter Appendix D; CL-2026-005 v0.4 Entry 3"
    target_observable: "K(t)"
    error_metric: "relative_frobenius"
    threshold: 1.0e-8              # primary tolerance for K(t) shape (B.1) at order 2

# ─── Acceptance criterion ─────────────────────────────────────────────────────

acceptance_criterion:
  reference: "Letter Eq. (19); Letter Appendix D; CL-2026-005 v0.4 Entry 3"
  observable: "K(t)"
  error_metric: "relative_frobenius"
  threshold: 1.0e-8
  projection_scheme: null
  rationale: |
    PASS iff every test case in frozen_parameters.model.test_cases satisfies
    its per-case derived-observable conditions on K(t).

    Define, for each computed K(t) at every n ∈ [1, ..., n_points]:

      shape_residual(t)   := ||K(t) - 0.5 * trace(sigma_z * K(t)) * sigma_z||_F
                             / ||K(t)||_F
      omega_r(t)          := trace(sigma_z * K(t))   (the coefficient of sigma_z/2 in K)
      shift(t)            := omega_r(t) - omega

    Per-case PASS conditions, mapped to Entry 3.B sub-claims:

    (1) thermal_bath:
        - B.1 (K ∝ sigma_z): max_t shape_residual(t) <= 1.0e-8.
        - B.2 (no renormalisation in thermal case): max_t |shift(t)| <= 1.0e-8.
        Failure of B.2 in the thermal case would indicate either a TCL
        recursion bug (the "trivial" prediction at every order is broken)
        or a numerical-integration artefact at the chosen tolerances.

    (2) coherent_displaced_bath:
        - B.1 (K ∝ sigma_z, still): max_t shape_residual(t) <= 1.0e-8.
        - B.3 (time-dependent shift in non-thermal bath):
            max_t |shift(t)| > 1.0e-5
          (the signal must EXCEED the sensitivity floor; this is a
          *positive* assertion that the displaced bath produces a
          measurable shift, not a tolerance check).
        Failure of B.3 (signal below sensitivity) would indicate either
        the displacement amplitude is too small to produce a second-order
        signal at this perturbative order, or the recursion is missing
        the odd-cumulant contribution.

    PASS for the card requires all four conditions (B.1 in each case +
    B.2 in thermal + B.3 in displaced). The bounded-maximalist reading
    (DG-1 work plan v0.1.2 §1.1) requires every Entry 3.B sub-claim to
    be exercised; this card exercises all three, with B.1 verified in
    both bath-state configurations as a cross-check.

    N_card = 2 per plan §1.2: B.3 is a second-order observable per
    Letter Appendix D. The card runs the TCL recursion at every order
    n ∈ {0, 1, 2}; B.1 and B.2 hold at every order in the thermal case;
    B.3 manifests at order 2 in the displaced case.

    Out of scope for Card A3 (DG-1 boundary):
      - "At all orders" verification: DG-1 verifies up to N_card = 2;
        the analytical proof's all-order character is acknowledged but
        not gated by DG-1 (plan §1.1). A future steward who finds
        the structure violated at order 3+ would log a DG-2 finding,
        not retroactively invalidate this DG-1 PASS.
      - Cross-basis verification (evaluating K(t) in a non-matrix-unit
        Hilbert-Schmidt orthonormal basis and asserting agreement):
        DG-2 universal-default structural-identity check.
      - Eigenbasis-rotation case (A = sigma_x rather than sigma_z):
        Card A4's territory.
      - Failure-envelope characterisation (e.g. coupling_strength sweep
        to find divergence): DG-4 territory.
      - Convergence in bath_mode_cutoff or t_end: not part of DG-1
        acceptance; the values frozen here are within the regime where
        the analytical predictions are unambiguous (alpha = 0.05, weak
        coupling; t_end = 20/omega, several memory times at T = 0.5).

