# ─── Failure-mode log ─────────────────────────────────────────────────────────

failure_mode_log:
  - date: "2026-04-30"
    change: |
      Removed test case "coherent_displaced_bath" (Entry 3.B.3 verification).
      Card A3 v0.1.1 verifies Entry 3.B.1 and 3.B.2 in the thermal case only.
    reason: |
      DG-1 Phase C.7 drafting (cbg.cumulants.D_bar_1, commit 18f36bb)
      surfaced the operationalisability gap on Card A3's coherent_displaced
      test case: the card's `bath_state.coherent_displaced` field carries
      `displacement_amplitude: 1.0` but does not pin the displacement-mode
      frequency or envelope. A coherent state on a multi-mode bath
      requires a basis choice that the card spec does not encode.

      Three resolution paths were considered:
        (a) Pick a homemade convention (e.g. single bath mode at omega_c
            displaced by alpha_disp; or all bath modes equally displaced)
            and implement at the model layer (cbg/models/pure_dephasing.py).
        (b) Defer Entry 3.B.3 to DG-2, parallel to the Entry 1.B.3
            deferral (Card A1 v0.1.0 -> v0.1.1; Hayden-Sorce 2022
            transcription gap).
        (c) Hybrid — keep the test case but ungated.

      Path (b) was approved on disciplinary grounds: a homemade
      convention would make DG-1 verify "our convention produces
      structure" rather than "the paper's prediction is reproduced".
      That weakens the validity envelope. The operationalisability
      carve-out in DG-1 work plan v0.1.4 §1.1 is the canonical home
      for this reasoning. A future card can repatriate Entry 3.B.3
      to a fresh DG-1 verification once Letter Appendix D's
      displacement convention is transcribed (or a Council-cleared
      convention is adopted).

      Routing: this is a steward-side scope adjustment per DG-1 work
      plan v0.1.4 §1.1. It does not bear on the Ledger (the Ledger's
      Entry 3.B.3 claim is not invalidated; it is simply not gated by
      DG-1 of this repository). No Council deliberation is required.
    predecessor_card_id: "A3"
    predecessor_version: "v0.1.0"

