# ─── Failure-mode log ─────────────────────────────────────────────────────────

failure_mode_log:
  - date: "2026-04-30"
    change: |
      Removed test case "coherent_displaced_bath" (Entry 4.B.2 verification).
      Card A4 v0.1.1 verifies Entry 4.B.1 in the thermal case only.
    reason: |
      DG-1 Phase C.7 drafting (cbg.cumulants.D_bar_1, commit 18f36bb)
      surfaced the operationalisability gap on the coherent_displaced
      test case: the card's `bath_state.coherent_displaced` field carries
      `displacement_amplitude: 1.0` but does not pin the displacement-mode
      frequency or envelope. A coherent state on a multi-mode bath
      requires a basis choice that the card spec does not encode. The
      same gap was surfaced for Card A3 (Entry 3.B.3) and is resolved
      identically here — DG-2 deferral, parallel to Entry 1.B.3
      (Card A1 v0.1.0 -> v0.1.1; Hayden-Sorce 2022 transcription gap).

      Resolution path: DG-2 deferral, recorded under DG-1 work plan
      v0.1.4 §1.1 operationalisability carve-out. A homemade convention
      would make DG-1 verify "our convention produces structure" rather
      than "the paper's prediction (Letter App. D) is reproduced",
      weakening the validity envelope. A future card can repatriate
      Entry 4.B.2 to a fresh DG-1 verification once Letter Appendix D's
      displacement convention is transcribed (or a Council-cleared
      convention is adopted).

      Routing: this is a steward-side scope adjustment per DG-1 work
      plan v0.1.4 §1.1. It does not bear on the Ledger (the Ledger's
      Entry 4.B.2 claim is not invalidated; it is simply not gated by
      DG-1 of this repository). No Council deliberation is required.
    predecessor_card_id: "A4"
    predecessor_version: "v0.1.0"

