    ledger/CL-2026-005_v0.4_council-deliberation_act2_2026-05-04.md)
    cleared the displacement-mode profile registry under handling (c)
    (convention-agnostic registry encoding) of the subsidiary briefing
    v0.3.0 §4.3. The four cleared profiles at v0.1.0 — delta-omega_c,
    delta-omega_S, sqrt-J, gaussian — are the initial admissible set
