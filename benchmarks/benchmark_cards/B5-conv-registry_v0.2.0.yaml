# DG-2 Benchmark Card B5-conv-registry — Coherently-displaced bath, σ_x coupling (v0.2.0 corrected)
#
# Anchor: CL-2026-005 v0.4 Entry 4.B.2 (eigenbasis rotation in non-thermal
#         bath); subsidiary briefing v0.3.0 §3.1–§3.4 + §6 + §6.1;
#         Letter Eqs. (D.4)-(D.6), Letter Eq. (22), Letter end-matter
#         "Contributions to K in spin systems / Unbiased spin system"
#         (Ledger/briefing route name: Appendix D);
#         transcriptions/colla-breuer-gasbarri-2025_appendix-d_v0.0.1.md
#         §2.3 / Eq. (A.40)-(A.45);
#         SCHEMA.md v0.1.2
# Phase: B (frozen-awaiting-run; supersedes B5-conv-registry v0.1.0)
#
# This card supersedes B5-conv-registry_v0.1.0.yaml on a card-design
# correction. The v0.1.0 expected_outcome / acceptance_criterion
# referenced an interaction-picture predicted transverse vector
#   (b_pred, c_pred) = D̄_1(t) · (cos(ω t), -sin(ω t))
# that does not match what the Schrödinger-picture runner computes.
# Companion Eq. (28) at n = 1 has no integral over A_I(τ); the
# displacement enters only through D̄_1(t) as a scalar prefactor on the
# (Schrödinger-picture) commutator [A, X]. For traceless A = σ_x, this
# extracts via Letter Eq. (6) to K_1(t) = D̄_1(t) · σ_x — a CONSTANT
# transverse direction along σ_x, with zero σ_y component at order 1.
# The v0.1.0 prediction conflated A_I(τ) (which rotates and enters at
# n = 2 via the TCL2 integral) with K_1 (which is proportional to A
# itself, not A_I(t)).
#
# v0.2.0 corrects the prediction to its Schrödinger-picture form:
#   (b_pred(t), c_pred(t)) = (D̄_1(t), 0)
# making B5 structurally analogous to B4-conv-registry v0.1.0:
#   B4: σ_z shift = 2 D̄_1(t)        (longitudinal channel)
#   B5: σ_x coefficient = D̄_1(t),
#       σ_y coefficient = 0           (transverse channels)
# Both predictions agree at every order ≤ N_card = 2 by the parity-class
# theorem of Letter end-matter Eq. (A.43)-(A.45) (transcription §2.3):
# even orders contribute only diagonal (σ_z + identity), so K_2's
# transverse coefficient is exactly zero in the displaced case (D̄_2 is
# unchanged by displacement; the parity structure for σ_x coupling under
# any Gaussian bath sends K_2 to the diagonal subspace).
#
# Convention: this is a CARD-INTERNAL CORRECTION, not a Council-level
# convention change. The four cleared displacement profiles (subsidiary
# briefing v0.3.0 §3.1–§3.4) are unchanged. The Steward's role in
# selecting the convention (§4.3 handling (c) registry encoding) is
# unchanged. Per the §6.1 registry-clearance-gate, no profile additions
# or removals occur. No fresh Council deliberation is required for this
# supersedure (it is a steward-side correction of a frozen prediction
# text to match the already-implemented physics).
#
# model_kind: dynamical with test_cases (four coherent-displaced cases at
# v0.2.0, one per cleared profile — verbatim the same fixtures as v0.1.0).
# perturbative_order: 2 (matches v0.1.0 + B4 v0.1.0).

# ─── Top-level metadata ───────────────────────────────────────────────────────

schema_version: "v0.1.2"
card_id: "B5-conv-registry"
version: "v0.2.0"
date: "2026-05-04"
dg_target: "DG-2"
ledger_entry: "CL-2026-005 v0.4 Entry 4.B.2"
model: "spin_boson_sigma_x"
status: "frozen-awaiting-run"
supersedes: "B5-conv-registry_v0.1.0.yaml"
license: "CC-BY-4.0 (LICENSE-docs)"

# ─── Gauge block ──────────────────────────────────────────────────────────────

gauge:
  gauge: "hayden-sorce-minimal-dissipation"
  coordinate_dependent: true
  direct_observable: false
  gauge_alignment_required_for_comparison:
    - "hmf"
    - "polaron"
    - "mori"

# ─── Frozen parameters ────────────────────────────────────────────────────────

frozen_parameters:

  model:
    model_kind: "dynamical"
    system_dimension: 2
    system_hamiltonian: "(omega / 2) * sigma_z"
    coupling_operator: "sigma_x"           # orthogonal to H_S; structurally distinct from B4's σ_z
    bath_type: "bosonic_linear"
    bath_spectral_density:
      family: "ohmic"
      cutoff_frequency: 10.0               # omega-units; matches A4 v0.1.1 + B4 v0.1.0 + B5 v0.1.0
      coupling_strength: 0.05
    parameters:
      omega: 1.0                           # system Bohr frequency ω_S
    test_cases:

      - name: "displaced_bath_delta_omega_c"
        description: |
          Coherently-displaced bosonic bath under the §3.1 cleared profile
          (registry key ``delta-omega_c``): single bath mode at ω_c = 10.0
          displaced by α₀ = 1.0. Under σ_x coupling, the Schrödinger-
          picture L_1^S[X](t) = -i D̄_1(t) [σ_x, X] extracts to
          K_1(t) = D̄_1(t) σ_x via Letter Eq. (6) — a constant-direction
          transverse contribution along σ_x with zero σ_y component at
          order 1.
        bath_state:
          family: "coherent_displaced"
          displacement_profile: "delta-omega_c"
          parameters:
            alpha_0: 1.0
            omega_c: 10.0
        expected_outcome: |
          K(t) acquires a non-zero σ_x component under the displaced bath
          (eigenbasis rotates away from σ_z); σ_y component remains zero
          at order ≤ N_card = 2. Specifically:
            b(t) := 0.5 trace(σ_x · K(t)) = D̄_1(t)   (closed-form per profile)
            c(t) := 0.5 trace(σ_y · K(t)) = 0         (parity-class theorem; Eq. (A.43))
            d(t) := 0.5 trace(σ_z · K(t)) = ω/2 + thermal-K_2-Lamb-shift  (irrelevant to verdict)
          B.2 verdict gates b(t) − D̄_1(t) and c(t) directly; the σ_z
          coefficient is uncon­strained by Entry 4.B.2.
        verifies:
          - "Entry 4.B.2 (eigenbasis rotation in non-thermal bath) under §3.1 / delta-omega_c profile"
        reference: "Letter Eqs. (D.4)-(D.6); Letter Eq. (22); Letter end-matter Eq. (A.40)-(A.45); CL-2026-005 v0.4 Entry 4.B.2; subsidiary briefing v0.3.0 §3.1; transcriptions/colla-breuer-gasbarri-2025_appendix-d_v0.0.1.md §2.3"
        notes: |
          Per (c)-discipline transposition (subsidiary briefing v0.3.0 §7,
          Council Act 2 verdict): parameter values disclosed explicitly.
          Hasse et al. (Nat. Commun. 16, 2502 (2025)) used a near-resonant
          motional-mode displacement; this fixture's ω_c = 10.0 is the
          bath cutoff (well above any system frequency) and is *not*
          Hasse-matched. No (c)-transposition disclosure required.
          Parameter values match B5 v0.1.0 verbatim.

      - name: "displaced_bath_delta_omega_S"
        description: |
          Coherently-displaced bosonic bath under the §3.2 cleared profile
          (registry key ``delta-omega_S``): single bath mode at ω_S = 1.0
          displaced by α₀ = 1.0. Resonant displacement; the predicted
          σ_x coefficient is the single-frequency D̄_1(t) at ω_S.
        bath_state:
          family: "coherent_displaced"
          displacement_profile: "delta-omega_S"
          parameters:
            alpha_0: 1.0
            omega_S: 1.0
        expected_outcome: |
          K(t)'s σ_x component equals D̄_1(t) (closed-form; resonant
          oscillation at ω_S); σ_y component is zero at order ≤ N_card = 2.
        verifies:
          - "Entry 4.B.2 under §3.2 / delta-omega_S profile"
        reference: "Letter Eqs. (D.4)-(D.6); Letter Eq. (22); Letter end-matter Eq. (A.40)-(A.45); CL-2026-005 v0.4 Entry 4.B.2; subsidiary briefing v0.3.0 §3.2; transcriptions/colla-breuer-gasbarri-2025_appendix-d_v0.0.1.md §2.3"
        notes: |
          Per (c)-discipline transposition: parameter values disclosed
          explicitly. Hasse et al. (2025) operated near a single
          motional-mode resonance; the resonant character qualitatively
          parallels this fixture's choice ω_S = 1.0, but the absolute
          frequency in Hasse et al. (MHz) and this fixture's ω_S = 1.0
          (in dimensionless ω-units, no MHz mapping declared) differ by
          many orders of magnitude on any common dimensional scale. No
          (c)-transposition disclosure required beyond this note.
          Parameter values match B5 v0.1.0 verbatim.

      - name: "displaced_bath_sqrt_J"
        description: |
          Coherently-displaced bosonic bath under the §3.3 cleared profile
          (registry key ``sqrt-J``): broadband displacement matched to
          √J(ω) on the bath spectrum.
        bath_state:
          family: "coherent_displaced"
          displacement_profile: "sqrt-J"
          parameters:
            alpha_0: 1.0
        expected_outcome: |
          K(t)'s σ_x component equals D̄_1(t) (broadband-integrated;
          quadrature-bounded numerically); σ_y component is zero.
        verifies:
          - "Entry 4.B.2 under §3.3 / sqrt-J profile"
        reference: "Letter Eqs. (D.4)-(D.6); Letter Eq. (22); Letter end-matter Eq. (A.40)-(A.45); CL-2026-005 v0.4 Entry 4.B.2; subsidiary briefing v0.3.0 §3.3; transcriptions/colla-breuer-gasbarri-2025_appendix-d_v0.0.1.md §2.3"
        notes: |
          Per (c)-discipline transposition: parameter values disclosed
          explicitly. Hasse et al. (2025) used a δ-function-like single-
          mode displacement, NOT a J-matched broadband displacement;
          this fixture's profile shape is structurally distinct and
          cannot match Hasse et al.'s setup at any parameter values.
          No (c)-transposition disclosure required.
          Parameter values match B5 v0.1.0 verbatim.

      - name: "displaced_bath_gaussian"
        description: |
          Coherently-displaced bosonic bath under the §3.4 cleared profile
          (registry key ``gaussian``): Gaussian envelope at ω_d = 5.0 with
          width Δω = 2.0.
        bath_state:
          family: "coherent_displaced"
          displacement_profile: "gaussian"
          parameters:
            alpha_0: 1.0
            omega_d: 5.0
            Delta_omega: 2.0
        expected_outcome: |
          K(t)'s σ_x component equals D̄_1(t) (Gaussian-weighted integral;
          quadrature-bounded numerically); σ_y component is zero.
        verifies:
          - "Entry 4.B.2 under §3.4 / gaussian profile"
        reference: "Letter Eqs. (D.4)-(D.6); Letter Eq. (22); Letter end-matter Eq. (A.40)-(A.45); CL-2026-005 v0.4 Entry 4.B.2; subsidiary briefing v0.3.0 §3.4; transcriptions/colla-breuer-gasbarri-2025_appendix-d_v0.0.1.md §2.3"
        notes: |
          Per (c)-discipline transposition: parameter values disclosed
          explicitly. Hasse et al. (2025) operated on a near-δ-function
          single-mode displacement, NOT a Gaussian envelope; this
          fixture's profile shape is structurally distinct. ω_d = 5.0
          (mid-cutoff) is deliberately *not* set to ω_S = 1.0 (which
          would specialise toward delta-omega_S in the Δω → 0 limit)
          and not set to ω_c = 10.0 (which would specialise toward
          delta-omega_c). No (c)-transposition disclosure required.
          Parameter values match B5 v0.1.0 verbatim.

  truncation:
    perturbative_order: 2                  # N_card per DG-1 work plan v0.1.4 §1.2; matches v0.1.0
    basis: "matrix_unit"
    bath_mode_cutoff: 1024

  numerical:
    time_grid:
      t_start: 0.0
      t_end: 20.0
      n_points: 200
      scheme: "uniform"
    integration_tolerance:
      relative: 1.0e-8
      absolute: 1.0e-10
    solver: "scipy_dop853"

  comparison:
    reference: "Letter Eqs. (D.4)-(D.6); Letter Eq. (22); Letter end-matter Eq. (A.40)-(A.45); CL-2026-005 v0.4 Entry 4.B.2; subsidiary briefing v0.3.0; transcriptions/colla-breuer-gasbarri-2025_appendix-d_v0.0.1.md"
    target_observable: "K_perp(t) = (b(t), c(t)) with predicted (D̄_1(t), 0)"
    error_metric: "max_t_absolute"
    threshold: 1.0e-4                      # matches B4 v0.1.0 + B5 v0.1.0; quadrature-bounded for §3.3 / §3.4 fixtures

# ─── Acceptance criterion ─────────────────────────────────────────────────────

acceptance_criterion:
  reference: "Letter Eqs. (D.4)-(D.6); Letter Eq. (22); Letter end-matter Eq. (A.40)-(A.45); CL-2026-005 v0.4 Entry 4.B.2; subsidiary briefing v0.3.0"
  observable: "K_perp(t) = (b(t), c(t)) — σ_x and σ_y coefficients of K(t) in Schrödinger picture"
  error_metric: "max_t_absolute"
  threshold: 1.0e-4
  projection_scheme: null
  rationale: |
    PASS iff every test case in frozen_parameters.model.test_cases
    satisfies its per-case derived-observable conditions on K(t).

    Decompose K(t) in the Pauli basis at every n ∈ [1, ..., n_points]:

      K(t) = a(t) * I + b(t) * sigma_x + c(t) * sigma_y + d(t) * sigma_z

    where the coefficients are extracted as
      b(t) := 0.5 * trace(sigma_x * K(t))
      c(t) := 0.5 * trace(sigma_y * K(t))

    Define:

      b_predicted(t)      := D̄_1(t).real for the registered profile,
                              computed via cbg.cumulants.D_bar_1.
      c_predicted(t)      := 0
      transverse_error(t) := sqrt((b(t) - b_predicted(t))^2 + c(t)^2)

    Per-case PASS conditions, mapped to Entry 4.B.2 sub-claim:

      - B.2 (eigenbasis rotation in non-thermal bath; Schrödinger-picture
        prediction): max_t transverse_error(t) <= 1.0e-4.
        This decomposes into two independent checks:
          (i)  max_t |b(t) - D̄_1(t)| <= 1.0e-4   (σ_x channel; Schrödinger-
               picture K_1 = D̄_1(t) σ_x)
          (ii) max_t |c(t)| <= 1.0e-4              (σ_y channel; zero by
               parity-class theorem at order ≤ N_card = 2)
        The combined Euclidean form is used for verdict reporting.

    PASS for the card requires this condition for every test_case. The
    card's overall verdict reports per-profile verdicts atomically
    without aggregation — under handling (c) (Council Act 2 verdict),
    each fixture's verdict is its own; one profile's failure does not
    cascade to the others.

    Per-profile expectations on the verdict accuracy:
      - delta-omega_c, delta-omega_S: closed-form predicted σ_x coefficient
        equal to the closed-form D̄_1(t); per-fixture max_t error expected
        ≤ 1.0e-12 (well below threshold). The σ_y check is exact
        (parity-class theorem; floating-point residuals only).
      - sqrt-J, gaussian: predicted σ_x coefficient computed via numerical
        quadrature (the SAME quadrature path the runner uses for K_1 via
        D_bar_1); quadrature error cancels at the verdict-comparison
        layer. Per-fixture max_t error expected at machine precision.

    Out of scope for Card B5-conv-registry v0.2.0:
      - Entry 3.B.3 (σ_z coupling, time-dependent shift): B4-conv-
        registry's territory.
      - Profiles outside the four cleared registry keys: registry
        additions require fresh Council clearance per subsidiary
        briefing v0.3.0 §6.1 registry-clearance-gate.
      - Cross-basis verification: B3's territory.
      - Higher orders (N > N_card = 2): future K_2-K_4 numerical-
        recursion plan.
      - Failure-envelope sweeps in coupling_strength or alpha_0: DG-4
        territory.
      - The σ_z coefficient d(t): Entry 4.B.2 explicitly does not gate
        an energy-level shift; B5 verdict is only on the transverse
        channels.

