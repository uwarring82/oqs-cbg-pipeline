# ─── Failure-mode log ─────────────────────────────────────────────────────────

failure_mode_log:
  - date: "2026-05-04"
    change: |
      Corrected the predicted transverse vector from the v0.1.0
      interaction-picture form (b_pred, c_pred) = D̄_1(t) · (cos(ω t),
      -sin(ω t)) to the Schrödinger-picture form (b_pred, c_pred) =
      (D̄_1(t), 0). Acceptance criterion rewritten to gate b(t) - D̄_1(t)
      and c(t) directly (or equivalently the Euclidean error).
    reason: |
      The v0.1.0 prediction conflated A_I(τ) — the interaction-picture
      coupling operator that rotates and enters at n = 2 via the TCL2
      time integral — with K_1 itself, which is proportional to A
      (not A_I(t)) by Companion Eq. (28) at n = 1. The Schrödinger-
      picture L_1^S[X](t) = -i D̄_1(t) [A, X] has no integral over
      A_I(τ) (the displacement enters only through the scalar prefactor
      D̄_1(t)), so K_1(t) = D̄_1(t) · A under K_from_generator's
      traceless projection. For traceless A = σ_x, this is K_1(t) =
      D̄_1(t) σ_x — a constant-direction transverse contribution along
      σ_x with zero σ_y component at order 1. The B4-conv-registry
      v0.1.0 verdict commit (62e44d0, 2026-05-04) established this
      structurally for σ_z coupling (where the same logic gives
      K_1(t) = D̄_1(t) σ_z, the longitudinal shift); B5 v0.1.0's
      σ_x-coupling prediction text mis-derived the transverse channel.

      The runner pipeline (cbg.tcl_recursion.K_total_displaced_on_grid;
      reporting.benchmark_card._run_dynamical) is unchanged — the B4
      verdict commit established the canonical Schrödinger-picture L_1^S
      construction. The v0.1.0 → v0.2.0 supersedure is purely a
      correction to the frozen prediction text in the YAML; no code or
      runner changes are needed beyond registering the B5-specific
      dynamical handler under (spin_boson_sigma_x, displaced_bath_*)
      keys (verdict-commit work).

      Routing: this is a steward-side card-design correction, not a
      Council-level convention change. The four cleared profiles
      (subsidiary briefing v0.3.0 §3.1–§3.4) are unchanged. The
      §6.1 registry-clearance-gate is not engaged. No Council
      deliberation is required.

      Cards-first audit: B5 v0.1.0 was frozen on 2026-05-04 and the
      v0.2.0 supersedure lands the same day. Per SCHEMA.md §Card
      lifecycle, the v0.1.0 file is retained at HEAD with status
      "superseded" and superseded_by set; v0.2.0 carries supersedes
      pointing back. No B5 v0.1.0 verdict was attempted between freeze
      and supersedure (its handlers were never registered), so no
      verdict-trail invalidation arises.
    predecessor_card_id: "B5-conv-registry"
    predecessor_version: "v0.1.0"

