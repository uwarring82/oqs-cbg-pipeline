# DG-3 Benchmark Card C1 v0.2.0 — Cross-method validation, pure-dephasing model,
#                                  thermal-only, triple-method (HEOM as third method)
#
# Anchor: Sail v0.5 §9 (DG-3 failure-asymmetry clearance, §5 Tier 3);
#         docs/benchmark_protocol.md §2, §3;
#         SCHEMA.md v0.1.4 (third-method fields);
#         DG-3 work plan v0.1.1 §§2, 3, 4 Phase C
# Phase: B (frozen-awaiting-run; supersedes C1 v0.1.0)
#
# This card supersedes C1 v0.1.0 (frozen-awaiting-run; baseline-pair runner
# reachability landed but no admissible PASS verdict). v0.2.0 extends the
# baseline pair (exact_finite_env + qutip_reference) with HEOM via QuTiP 5's
# in-tree qutip.solver.heom.HEOMSolver as a third reference method drawn
# from the bath-hierarchy-truncation failure-mode class (non-overlapping
# with finite-system and solver-default per docs/benchmark_protocol.md §2).
#
# Scope cut from v0.1.0:
#   - displaced_bath_delta_omega_c_cross_method test_case is NOT carried.
#     The HEOM Phase B module (benchmarks/heom_reference.py v0.1.0) supports
#     only thermal handlers; extending HEOM to the coherent-displaced
#     fixture is a separate handler-expansion task that would blur whether
#     a failure originates in HEOM itself, the cf-fit residual on the bath
#     correlator, or the coherent-displacement implementation. The displaced
#     fixture remains tractable for a future C1 v0.3.0 once the HEOM module
#     ships displaced handlers; see failure_mode_log entry 0.
#
# Gating-pair rationale (comparison.gating_pair):
#   exact_finite_env vs heom_reference is the gating pair because both
#   methods capture the full non-Markovian dephasing dynamics through
#   different mechanisms (finite-mode unitary evolution vs hierarchy-of-
#   auxiliaries with multi-exponential bath fit). Agreement between them
#   would constitute the failure-asymmetry clearance required by Sail v0.5
#   §5 Tier 3. qutip_reference (Markov Lindblad) is recorded as auxiliary
#   evidence in result.notes but does not gate the verdict, since Markovian
#   defaults are not expected to match the non-Markovian methods at short
#   times.

# ─── Top-level metadata ───────────────────────────────────────────────────────

