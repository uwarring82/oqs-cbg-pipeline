# ─── Failure-mode log ─────────────────────────────────────────────────────────

failure_mode_log:
  - date: "2026-05-16"
    change: |
      v0.2.0 → v0.3.0 supersedure: replace the triple-method
      comparison.third_method form with the schema v0.1.5 generalised
      `methods` list (four methods: exact_finite_env, qutip_reference,
      heom_reference, oqupy_reference). Move the gating pair from
      (exact_finite_env, heom_reference) to (heom_reference,
      oqupy_reference). Retain exact_finite_env and qutip_reference as
      non-gating auxiliary trajectories. Add benchmarks.oqupy_reference
      to method_modules and a frozen oqupy_options block. Schema bumped
      v0.1.4 → v0.1.5 for the methods-list form. Card-level threshold
      (1.0e-6), bath spectral density, time grid, integration
      tolerances, gauge block, and heom_options are preserved from
      v0.2.0; the thermal-only scope is preserved.
    reason: |
      Phase D.0/D.1 reconnaissance (logbook
      2026-05-16_dg-3-phase-d-recon-gating-pair-blocked; commit d41ff66)
      proved the v0.2.0 gating pair (exact_finite_env, heom_reference)
      @1e-6 physically unsatisfiable for structural finite-bath reasons
      (cause `finite-env-correlator-floor`): exact_finite_env's discrete
      bath correlator converges to the continuum only ~O(1/n_modes)
      (relL2 4.15 @4 modes -> 0.33 @64; ~1e6 modes needed, ~6-8
