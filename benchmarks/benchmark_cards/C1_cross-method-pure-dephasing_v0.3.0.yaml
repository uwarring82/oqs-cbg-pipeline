      correct (matches independent quadrature to 5.5e-8); no convention
      bug; Fock truncation negligible. The valid DG-3 Tier-3 gate is
      therefore HEOM vs TEMPO/OQuPy (two faithful continuous-bath
      solvers, non-overlapping classes), per DG-3 work plan v0.1.2 §2.3
      (which explicitly supersedes the obsolete v0.1.1 §2.3 "no other
      structural change is required" framing). Option A (four-method,
      exact/qutip retained as non-gating auxiliary) is the steward
      decision of 2026-05-16. v0.2.0 remains frozen and unmutated as the
      auditable artifact that exposed the bad gate.
    predecessor_card_id: "C1"
    predecessor_version: "v0.2.0"

