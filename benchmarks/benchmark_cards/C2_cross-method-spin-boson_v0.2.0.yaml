# DG-3 Benchmark Card C2 v0.2.0 — Cross-method validation, spin-boson σ_x model,
#                                  thermal-only, triple-method (HEOM as third method)
#
# Anchor: Sail v0.5 §9 (DG-3 failure-asymmetry clearance, §5 Tier 3);
#         docs/benchmark_protocol.md §2, §3;
#         SCHEMA.md v0.1.4 (third-method fields);
#         DG-3 work plan v0.1.1 §§2, 3, 4 Phase C
# Phase: B (frozen-awaiting-run; supersedes C2 v0.1.0)
#
# σ_x-coupling sibling of Card C1 v0.2.0. Extends the C2 v0.1.0 baseline pair
# with HEOM via qutip.solver.heom.HEOMSolver as a third reference method.
# Same gating-pair logic (exact_finite_env vs heom_reference) and same
# thermal-only scope cut as C1 v0.2.0; see C1 v0.2.0 header for the full
# rationale. Differences from C1 v0.2.0:
#   - coupling_operator: σ_x (vs σ_z);
#   - model_name: spin_boson_sigma_x;
#   - bath spectrum is sampled at ±ω_S rather than at 0 (handled inside
#     the cbg correlator and the qutip_reference σ_-/σ_+ secular Lindblad);
#   - HEOM's hierarchy now resolves spin-flip dynamics (memory in σ_x
#     coupling) rather than the dephasing channel.

# ─── Top-level metadata ───────────────────────────────────────────────────────

schema_version: "v0.1.4"
card_id: "C2"
version: "v0.2.0"
date: "2026-05-15"
dg_target: "DG-3"
ledger_entry: "CL-2026-005 v0.4 Entry 4 (cross-method corroboration, failure-asymmetry clearance)"
model: "spin_boson_sigma_x"
status: "frozen-awaiting-run"
supersedes: "C2_cross-method-spin-boson_v0.1.0.yaml"
license: "CC-BY-4.0 (LICENSE-docs)"

# ─── Gauge block ──────────────────────────────────────────────────────────────

gauge:
  gauge: "hayden-sorce-minimal-dissipation"
  coordinate_dependent: true
  direct_observable: false
  gauge_alignment_required_for_comparison:
    - "hmf"
    - "polaron"
    - "mori"

# ─── Frozen parameters ────────────────────────────────────────────────────────

frozen_parameters:

  model:
    model_kind: "dynamical"
    system_dimension: 2
    system_hamiltonian: "(omega / 2) * sigma_z"
    coupling_operator: "sigma_x"
    bath_type: "bosonic_linear"
    bath_spectral_density:
      family: "ohmic"
      cutoff_frequency: 10.0
      coupling_strength: 0.05
    parameters:
      omega: 1.0
    test_cases:

      - name: "thermal_bath_cross_method"
        description: |
          Thermal bosonic bath at T = 0.5 (omega-units), σ_x coupling. Three
          reference methods on the same model spec:
            - exact_finite_env (finite-system class);
            - qutip_reference (σ_-/σ_+ secular Lindblad at S(±ω_S));
            - heom_reference (bath-hierarchy-truncation, σ_x coupling).
          The gating pair is (exact_finite_env, heom_reference). σ_x coupling
          drives population relaxation toward Boltzmann equilibrium plus
          coherence dynamics on the |↑⟩/|↓⟩ basis; both non-Markovian
          methods should agree on the full trajectory whereas the Markov
          reference is expected to underestimate transient coherence
          amplitudes at short times.
        bath_state:
          family: "thermal"
          temperature: 0.5
        expected_outcome: |
          The gating pair (exact_finite_env, heom_reference) agrees on the
          reduced density matrix rho(t) to within
          inter_method_relative_frobenius <= 1.0e-6. The auxiliary
          qutip_reference vs exact_finite_env discrepancy is expected to
          be O(5e-1) (the C2 v0.1.0 baseline-pair run measured ~0.538 at the
          same fixture) and is recorded but does not gate.
        verifies:
          - "DG-3 failure-asymmetry clearance: exact_finite_env (finite-system) vs heom_reference (bath-hierarchy-truncation) under σ_x coupling"
          - "Tier 3 non-overlapping failure-mode triple for σ_x relaxation dynamics"
        reference: "Sail v0.5 §9 DG-3, §5 Tier 3; DG-3 work plan v0.1.1 §2.2"

  truncation:
    perturbative_order: 2
    basis: "matrix_unit"
    bath_mode_cutoff: 1024

  numerical:
    time_grid:
      t_start: 0.0
      t_end: 20.0
      n_points: 200
      scheme: "uniform"
    integration_tolerance:
      relative: 1.0e-10
      absolute: 1.0e-12
    solver: "scipy_dop853"

  comparison:
    reference: "triple-method: exact_finite_env vs qutip_reference vs heom_reference"
    target_observable: "reduced_density_matrix"
    error_metric: "inter_method_relative_frobenius"
    threshold: 1.0e-6
    projection_scheme: null
    third_method: "heom"
    third_method_module: "benchmarks.heom_reference"
    gating_pair:
      - "exact_finite_env"
      - "heom_reference"
    heom_options:
      t_max_factor: 30.0
      n_pts_correlator: 1024
      cf_target_rmse: 5.0e-3
      cf_Nr_max: 3
      cf_Ni_max: 2
      max_depth: 3

# ─── Acceptance criterion ─────────────────────────────────────────────────────

acceptance_criterion:
  reference: "triple-method: exact_finite_env vs qutip_reference vs heom_reference"
  observable: "reduced_density_matrix"
  error_metric: "inter_method_relative_frobenius"
  threshold: 1.0e-6
  projection_scheme: null
  rationale: |
    Same triple-method gating structure as Card C1 v0.2.0, applied to the
    σ_x-coupled spin-boson model.

    PASS iff error(exact_finite_env, heom_reference) <= 1.0e-6 for the
    thermal_bath_cross_method test case. Auxiliary pairs (exact vs
    qutip, qutip vs heom) are recorded but do not gate.

    Failure-asymmetry interpretation: identical to C1 v0.2.0 — a gating-
    pair PASS would constitute the Sail v0.5 §5 Tier 3 failure-asymmetry
    clearance required by DG-3 under σ_x coupling. A FAIL routes a
    convergence audit on whichever non-Markovian method's truncation
    knob is the plausible bottleneck.

    Out of scope for Card C2 v0.2.0:
      - displaced_bath_delta_omega_c_cross_method: deferred to a future
        C2 v0.3.0 once the HEOM module ships a displaced σ_x handler.
      - TEMPO / pseudomode / MCTDH comparisons: fallback per DG-3 work
        plan v0.1.1 §§2.3, 2.4.
      - Failure-envelope characterisation: DG-4.
      - Thermodynamic discriminant: DG-5.

