# DG-4 Benchmark Card D1 — Failure envelope: parity-aware convergence breakdown
#
# Anchor: Sail v0.5 §9 (DG-4); docs/benchmark_protocol.md §4 (cause-label taxonomy);
#         SCHEMA.md v0.1.3; DG-4 work plan v0.1.4 (Phase A.bis)
# Phase: D (Path B numerical verdict reached)
#
# This card supersedes D1 v0.1.0 after DG-4 Phase B work exposed three
# load-bearing corrections:
#   1. pure_dephasing thermal Gaussian is TCL-2 exact, so L_n and
#      L_n^dissipator vanish for n >= 3 and cannot expose convergence failure;
#   2. sigma_x thermal has odd-order zeros by parity, so the convergence ratio
#      must compare even orders (r_4 = ||L_4^dis|| / ||L_2^dis||), not adjacent
#      orders;
#   3. the reproducibility perturbations must use operational knobs:
#      upper_cutoff_factor through numerical.quadrature, and omega_c through
#      direct model-spec mutation.
#
# The Path B numerical pilot (logbook/2026-05-06_dg-4-path-b-pilot-result.md)
# confirmed the design assumption: in sigma_x thermal, ||L_4^dis|| is non-zero
# and ~27x above the sigma_z thermal finite-env zero-oracle floor at baseline
# coupling_strength = 0.05. This remains a numerical pilot, not analytic n=4
# completion.

# ─── Top-level metadata ───────────────────────────────────────────────────────

