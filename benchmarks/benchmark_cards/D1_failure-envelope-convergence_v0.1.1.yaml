superseded_by: "D1_failure-envelope-convergence_v0.1.2.yaml"
license: "CC-BY-4.0 (LICENSE-docs)"

# ─── Gauge block ──────────────────────────────────────────────────────────────

gauge:
  gauge: "hayden-sorce-minimal-dissipation"
  coordinate_dependent: true
  direct_observable: false
  gauge_alignment_required_for_comparison:
    - "hmf"
    - "polaron"
    - "mori"

# ─── Frozen parameters ────────────────────────────────────────────────────────

frozen_parameters:

  model:
    model_kind: "dynamical"
    system_dimension: 2
    system_hamiltonian: "(omega / 2) * sigma_z"
    coupling_operator: "sigma_x"
    bath_type: "bosonic_linear"
    bath_spectral_density:
      family: "ohmic"
      cutoff_frequency: 10.0
      # coupling_strength is SWEPT; see sweep block below.
    bath_state:
      family: "thermal"
      temperature: 0.5
    parameters:
      omega: 1.0

  truncation:
    perturbative_order: 4
    basis: "matrix_unit"
    # bath_mode_cutoff intentionally omitted: DG-4 work plan v0.1.4 Phase A.bis
    # records it as non-operational on the continuum CBG recursion path.

  numerical:
    time_grid:
      t_start: 0.0
      t_end: 20.0
      n_points: 200
      scheme: "uniform"
    integration_tolerance:
      relative: 1.0e-10
      absolute: 1.0e-12
    solver: "scipy_dop853"
    quadrature:
      upper_cutoff_factor: 30.0

  comparison:
    reference: "internal-consistency: parity-aware even-order dissipator norm growth"
    target_observable: "r_4 = <||L_4^dissipator||>_t / <||L_2^dissipator||>_t"
    error_metric: "convergence_ratio_parity_aware"
    threshold: 1.0
    projection_scheme: null

  sweep:
    parameter_name: "coupling_strength"
    parameter_path: "model.bath_spectral_density.coupling_strength"
    sweep_range:
      start: 0.05
      end: 1.0
      n_points: 20
      scheme: "log_uniform"

  reproducibility:
    required_for_failing_candidate: true
    cause_label_if_stable: "convergence_failure"
    cause_label_if_unstable: "truncation_artefact"
    perturbations:
      - name: "upper_cutoff_factor"
        baseline: 30.0
        values: [20.0, 40.0]
        target_path: "numerical.quadrature.upper_cutoff_factor"
        pathway: "quadrature_kwargs_allow_list"
        notes: |
          Quadrature control forwarded by reporting.benchmark_card._quadrature_kwargs
          to cbg.cumulants / cbg.tcl_recursion.
      - name: "omega_c"
        baseline: 10.0
        values: [9.0, 11.0]
        target_path: "model.bath_spectral_density.cutoff_frequency"
        pathway: "model_spec_mutation"
        notes: |
          Model parameter perturbation. This value is NOT placed under
          numerical.quadrature because _quadrature_kwargs intentionally drops
          unknown keys.

# ─── Acceptance criterion ─────────────────────────────────────────────────────

acceptance_criterion:
  reference: "internal-consistency: parity-aware even-order dissipator norm growth"
  observable: "r_4 = <||L_4^dissipator||>_t / <||L_2^dissipator||>_t"
  error_metric: "convergence_ratio_parity_aware"
  threshold: 1.0
  projection_scheme: null
  rationale: |
    PASS iff the card identifies at least one reproducible failure regime
    with cause label "convergence failure" under the DG-4 taxonomy (Sail v0.5 §9).

    For each swept value of coupling_strength alpha_j:

      1. Build the sigma_x thermal model with
         model.bath_spectral_density.coupling_strength = alpha_j.
      2. Compute L_2^dissipator(t) and L_4^dissipator(t), using the repository
         convention

             L_n^dissipator(t) := L_n(t) + i [K_n(t), · ].

      3. Compute the time-averaged Frobenius norm of each Liouville
         superoperator:

             <||L_n^dis||>_t = (1/t_end) integral_0^t_end ||L_n^dis(t)||_F dt.

      4. Compute the parity-aware even-order ratio:

             r_4 = <||L_4^dis||>_t / <||L_2^dis||>_t.

    Failure regime definition:
      A swept value alpha_j is a failing candidate if r_4 > 1.0. This means
      the next-leading even-order dissipative correction exceeds the leading
      even-order dissipative term. Odd-order ratios are deliberately not used:
      L_1^dis and L_3^dis vanish in the thermal Gaussian sigma_x fixture by
      parity, so adjacent-order ratios are undefined.

    Zero-denominator policy:
      If <||L_2^dis||>_t is below the runner's machine-scale denominator guard,
      mark the point metric-undefined and exclude it from convergence-failure
      classification. In the sigma_x thermal fixture this should not fire:
      Phase B.3 confirmed ||L_2^dis|| > 0.

    Reproducibility requirement:
      Every failing candidate must be re-run under all four perturbations:
        - upper_cutoff_factor = 20.0 and 40.0 via numerical.quadrature;
        - cutoff_frequency omega_c = 9.0 and 11.0 via direct model-spec mutation.
      If r_4 > 1.0 is stable under all four perturbations, classify the point
      as "convergence failure" (cause label 1). If it flips under at least one
      perturbation, classify it as "truncation artefact" (cause label 4).

    DG-4 verdict logic:
      - PASS requires at least one alpha_j classified "convergence failure".
      - FAIL is admissible if the runner completes and no alpha_j is classified
        "convergence failure"; the result notes must record cause
        "no-failure-found-in-frozen-range" and route to a D2 supersedure with
        an extended frozen range, not an in-place edit of this card.
      - CONDITIONAL is admissible if all failing candidates are classified as
        "truncation artefact" under the reproducibility perturbations.

    TCL singularity observations:
      A future Lambda_t reconstruction card may target cause label
      "TCL singularity" directly. For D1 v0.1.1, singularity observations are
      recorded in result.notes only and do not gate PASS.

    Method note:
      The preferred L_4 source remains Path A (Companion Sec. IV closed form).
      If Phase C uses the benchmark-side Path B numerical extraction before
      Path A lands, result.notes must label the route "numerical-extraction"
      and record the sigma_z finite-env zero-oracle floor as an uncertainty
      band. Path B evidence is not analytic Phase B.2/B.3 (n=4) completion.

# ─── Result block ─────────────────────────────────────────────────────────────

result:
  verdict: "PASS"
  evidence:
    - "benchmarks/results/D1_failure-envelope-convergence_v0.1.1_result.json"
  commit_hash: "d7ca897fbf5a3594400675061b7926b84c9552af"
  runner_version: "0.1.0"
  notes: |
    Verdict computed by reporting.benchmark_card.run_card through the DG-4
    sweep runner _run_dg4_sweep, consuming the benchmark-side Path B numerical
    Richardson extraction source for L_4.

    Full frozen Phase D run:
      * start_utc: 2026-05-06T19:44:36+00:00
      * end_utc:   2026-05-06T19:45:12+00:00
      * runner_version: 0.1.0

    Baseline Path B fit:
      * alpha_values = (0.01, 0.015, 0.02, 0.025, 0.03)
      * n_bath_modes = 4
      * n_levels_per_mode = 3
      * fit_relative_residual = 4.744e-05
      * <||L_2^dis||>_t = 4.218e+01
      * <||L_4^dis||>_t = 1.962e+03
      * coefficient ratio <||L_4^dis||>_t / <||L_2^dis||>_t = 4.651e+01

    DG-4 PASS condition met: all 20 frozen coupling_strength sweep points
    classified as convergence_failure under the D1 v0.1.1 parity-aware ratio
    r_4 = coupling_strength * coefficient_ratio. The maximum baseline r_4 over
    the frozen range was 4.651260562533e+01 against threshold 1.0.

    Reproducibility caveat for the Path B route: omega_c perturbations are
    operational model-spec mutations in exact_finite_env; upper_cutoff_factor
    perturbations are threaded through the runner's quadrature path but are not
    consumed by the current exact_finite_env Path B extraction. The
    convergence_failure classification is therefore stable under the operational
    omega_c checks and unchanged under the runner-threaded upper_cutoff_factor
    checks, with the latter recorded as a Path-B-specific limitation until
    analytic Path A or a quadrature-consuming extraction route lands.

    No alpha_crit is bracketed inside the frozen sweep range. Because the
    first swept point already classifies as convergence_failure, the boundary
    lies below coupling_strength = 0.05 under this Path B run.

    Caveat: this is a numerical-L_4 verdict. Path B carries the documented
    finite-env extraction floor from the 2026-05-06 sigma_z thermal
    zero-oracle pilot (~few * 1e-2 at the default truncation). Analytic Path A
    (Companion Sec. IV closed form for L_4) remains pending and preferred for
    machine-precision order-4 recursion.

# ─── Failure-mode log ─────────────────────────────────────────────────────────

failure_mode_log:
  - date: "2026-05-06"
    change: |
      Supersedes D1 v0.1.0. Switches model from pure_dephasing (A = sigma_z)
      to spin_boson_sigma_x (A = sigma_x), replaces the adjacent/K_n norm
      convergence metric with the parity-aware even-order dissipator ratio
      r_4 = <||L_4^dis||>_t / <||L_2^dis||>_t, drops non-operational
      bath_mode_cutoff / integration_tolerance reproducibility perturbations,
      and freezes operational perturbations upper_cutoff_factor and omega_c.
    reason: |
      DG-4 work plan revisions v0.1.1 through v0.1.4 and Phase B findings
      showed that D1 v0.1.0 cannot operationalise the intended convergence
      failure. In pure_dephasing thermal Gaussian, Feynman-Vernon exactness
      makes the TCL series truncate at order 2; L_n and L_n^dissipator vanish
      for n >= 3, so no order-4 convergence signal can appear. In sigma_x
      thermal, odd orders still vanish by parity (Phase B.3 verified
      ||L_3^dis|| = 0), so adjacent-order ratios are parity-blind and become
      metric-undefined. The natural DG-4 signal is instead the even-order
      ratio r_4. The Path B pilot recorded on 2026-05-06 confirmed
      ||L_4^dis|| > 0 in sigma_x thermal, with the signal ~27x above the
      sigma_z thermal finite-env zero-oracle floor.
    predecessor_card_id: "D1"
    predecessor_version: "v0.1.0"
  - date: "2026-05-06"
    change: |
      Status flipped pass -> superseded. Superseded by
      D1_failure-envelope-convergence_v0.1.2.yaml. The PASS verdict above
      remains on the record (verdict immutability) but is downgraded; the
      v0.5.0 git tag remains as immutable history.
    reason: |
      Reviewer-side analysis on 2026-05-06 surfaced two HIGH-severity
      defects in the v0.1.1 verdict: (i) Path B applied the interaction-
      picture order-4 formula to raw Schrödinger-picture maps without
      Lambda_0^{-1} similarity / L_0 correction (wrong frame for
      H_S = (omega/2) sigma_z), and (ii) the runner's "stable under all
      four perturbations" PASS predicate was trivially satisfied for
      upper_cutoff_factor in {20, 40} because the previous Path B path
      did not consume that knob. Plus a MEDIUM audit-completeness gap
      (per-alpha + per-perturbation r_4 not persisted in the result JSON).
      See logbook/2026-05-06_dg-4-pass-path-b-superseded.md for the full
      citation; v0.1.2 supersedure consumes the d67b453..5441467 repair
      commits.
    predecessor_card_id: "D1"
    predecessor_version: "v0.1.1"

