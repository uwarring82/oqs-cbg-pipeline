card_id: "D1"
version: "v0.1.1"
date: "2026-05-06"
dg_target: "DG-4"
ledger_entry: "CL-2026-005 v0.4 Entry 2 (recursive-series convergence; scope-limited)"
model: "spin_boson_sigma_x"
status: "superseded"
