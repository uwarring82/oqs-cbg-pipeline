# DG-4 Benchmark Card D1 — Failure envelope: parity-aware convergence breakdown
#
# Anchor: Sail v0.5 §9 (DG-4); docs/benchmark_protocol.md §4 (cause-label taxonomy);
#         SCHEMA.md v0.1.3; DG-4 work plan v0.1.4 (Phase D supersedure)
# Phase: D (Path B numerical verdict, post-v0.1.1 supersedure)
#
# This card supersedes D1 v0.1.1 after reviewer-side analysis surfaced two
# HIGH-severity defects in the v0.1.1 verdict (recorded at
# `logbook/2026-05-06_dg-4-pass-path-b-superseded.md`):
#   1. Path B applied the interaction-picture order-4 formula
#      L_2 = d_t Lambda_2, L_4 = d_t Lambda_4 - L_2 Lambda_2 to raw
#      Schrödinger-picture maps. This is the order-4 expansion of
#      L_t = (d/dt Lambda_t) Lambda_t^{-1} only when Lambda_0 = id; for sigma_x
#      thermal with H_S = (omega/2) sigma_z, the omitted Lambda_0^{-1}
#      similarity and L_0 Lambda_n Lambda_0^{-1} correction terms are
#      nonzero, so the extracted ||L_n^dis|| was not picture-invariant.
#   2. The runner's "stable under all four perturbations" PASS predicate was
#      trivially satisfied for upper_cutoff_factor in {20, 40} because the
#      previous Path B path did not consume that knob.
#   3. (MEDIUM) The result JSON only stored aggregate counts; per-alpha
#      r_4_baseline + per-alpha-per-perturbation r_4 + per-perturbation
#      Path B fit residuals were not persisted.
#
# v0.1.2 picks up three repository changes that landed in the
# d67b453..5441467 commit range:
#   - benchmarks/numerical_tcl_extraction.transform_to_interaction_picture
#     conjugates Schrödinger maps by Ad U^dagger(t) before extraction;
#     path_b_dissipator_norm_coefficients now requires system_hamiltonian.
#   - reporting.benchmark_card._path_b_evaluate threads
#     numerical.quadrature.upper_cutoff_factor into the finite-env builder
#     as omega_max_factor, making the perturbation operational.
#   - reporting.benchmark_card.write_dg4_result_json persists the full
#     audit-complete sweep payload.
#
# The frozen card structure is unchanged from v0.1.1: same model, same
# parity-aware r_4 metric, same coupling_strength sweep, same four
# reproducibility perturbations. Only the predicate's interpretation
# changes — under v0.1.2 all four perturbations are operational, and the
# PASS predicate genuinely tests stability across the four.

# ─── Top-level metadata ───────────────────────────────────────────────────────

schema_version: "v0.1.3"
card_id: "D1"
version: "v0.1.2"
date: "2026-05-06"
dg_target: "DG-4"
ledger_entry: "CL-2026-005 v0.4 Entry 2 (recursive-series convergence; scope-limited)"
model: "spin_boson_sigma_x"
status: "pass"
supersedes: "D1_failure-envelope-convergence_v0.1.1.yaml"
license: "CC-BY-4.0 (LICENSE-docs)"

# ─── Gauge block ──────────────────────────────────────────────────────────────

gauge:
  gauge: "hayden-sorce-minimal-dissipation"
  coordinate_dependent: true
  direct_observable: false
  gauge_alignment_required_for_comparison:
    - "hmf"
    - "polaron"
    - "mori"

# ─── Frozen parameters ────────────────────────────────────────────────────────

frozen_parameters:

  model:
    model_kind: "dynamical"
    system_dimension: 2
    system_hamiltonian: "(omega / 2) * sigma_z"
    coupling_operator: "sigma_x"
    bath_type: "bosonic_linear"
    bath_spectral_density:
      family: "ohmic"
      cutoff_frequency: 10.0
      # coupling_strength is SWEPT; see sweep block below.
    bath_state:
      family: "thermal"
      temperature: 0.5
    parameters:
      omega: 1.0

  truncation:
    perturbative_order: 4
    basis: "matrix_unit"
    # bath_mode_cutoff intentionally omitted: DG-4 work plan v0.1.4 Phase A.bis
    # records it as non-operational on the continuum CBG recursion path.

  numerical:
    time_grid:
      t_start: 0.0
      t_end: 20.0
      n_points: 200
      scheme: "uniform"
    integration_tolerance:
      relative: 1.0e-10
      absolute: 1.0e-12
    solver: "scipy_dop853"
    quadrature:
      upper_cutoff_factor: 30.0
    path_b:
      alpha_values: [0.01, 0.015, 0.02, 0.025, 0.03]
      n_bath_modes: 4
      n_levels_per_mode: 3

  comparison:
    reference: "internal-consistency: parity-aware even-order dissipator norm growth"
    target_observable: "r_4 = <||L_4^dissipator||>_t / <||L_2^dissipator||>_t"
    error_metric: "convergence_ratio_parity_aware"
    threshold: 1.0
    projection_scheme: null

  sweep:
    parameter_name: "coupling_strength"
    parameter_path: "model.bath_spectral_density.coupling_strength"
    sweep_range:
      start: 0.05
      end: 1.0
      n_points: 20
      scheme: "log_uniform"

  reproducibility:
    required_for_failing_candidate: true
    cause_label_if_stable: "convergence_failure"
    cause_label_if_unstable: "truncation_artefact"
    perturbations:
      - name: "upper_cutoff_factor"
        baseline: 30.0
        values: [20.0, 40.0]
        target_path: "numerical.quadrature.upper_cutoff_factor"
        pathway: "model_spec_to_omega_max_factor"
        notes: |
          Threaded by reporting.benchmark_card._path_b_evaluate into
          benchmarks.exact_finite_env.build_spin_boson_sigma_x_thermal_total
          as the kwarg omega_max_factor (the upper cutoff of the bath-mode
          discretisation as a multiple of cutoff_frequency). Operational
          under Path B in v0.1.2; the v0.1.1 supersedure was triggered in
          part because this path was a no-op.
      - name: "omega_c"
        baseline: 10.0
        values: [9.0, 11.0]
        target_path: "model.bath_spectral_density.cutoff_frequency"
        pathway: "model_spec_mutation"
        notes: |
          Direct model-spec mutation, applied before the exact finite-
          environment build. Operational under Path B in both v0.1.1 and
          v0.1.2.

# ─── Acceptance criterion ─────────────────────────────────────────────────────

acceptance_criterion:
  reference: "internal-consistency: parity-aware even-order dissipator norm growth"
  observable: "r_4 = <||L_4^dissipator||>_t / <||L_2^dissipator||>_t"
  error_metric: "convergence_ratio_parity_aware"
  threshold: 1.0
  projection_scheme: null
  rationale: |
    PASS iff the card identifies at least one reproducible failure regime
    with cause label "convergence failure" under the DG-4 taxonomy
    (Sail v0.5 §9).

    For each swept value of coupling_strength alpha_j:

      1. Build the sigma_x thermal model with
         model.bath_spectral_density.coupling_strength = alpha_j.
      2. Reconstruct raw Schrödinger-picture maps via
         benchmarks.exact_finite_env.build_spin_boson_sigma_x_thermal_total
         for each alpha in path_b.alpha_values.
      3. Subtract the alpha=0 closed-system baseline and least-squares fit
         the even-power expansion Lambda_t(alpha) = Lambda_0 + alpha^2
         Lambda_2 + alpha^4 Lambda_4 + O(alpha^6).
      4. Transform the fit coefficients Lambda_2, Lambda_4 to the
         interaction picture via
         benchmarks.numerical_tcl_extraction.transform_to_interaction_picture
         using H_S from the model_spec; this makes the order-4 extractor's
         L_2 = d_t Lambda_2, L_4 = d_t Lambda_4 - L_2 Lambda_2 formula
         valid (Lambda_0 = id in the interaction picture).
      5. Compute K_n via Letter Eq. (6) on each L_n superoperator and form
         the dissipator residual L_n^dissipator(t) := L_n(t) + i [K_n(t),·].
      6. Compute the time-averaged Liouville-Frobenius norm of each
         dissipator superoperator:
             <||L_n^dis||>_t = (1/t_end) integral_0^t_end ||L_n^dis(t)||_F dt.
      7. Compute the parity-aware even-order ratio:
             r_4 = <||L_4^dis||>_t / <||L_2^dis||>_t.

    Failure regime definition:
      A swept value alpha_j is a failing candidate if r_4 > 1.0. Odd-order
      ratios are deliberately not used: L_1^dis and L_3^dis vanish in the
      thermal Gaussian sigma_x fixture by parity, so adjacent-order ratios
      are undefined.

    Zero-denominator policy:
      If <||L_2^dis||>_t is below the runner's machine-scale denominator
      guard, mark the point metric-undefined and exclude it from
      convergence-failure classification.

    Reproducibility requirement:
      Every failing candidate must be re-run under all four perturbations:
        - upper_cutoff_factor in {20.0, 40.0} via the runner threading the
          value into the finite-env builder as omega_max_factor;
        - cutoff_frequency omega_c in {9.0, 11.0} via direct model-spec
          mutation.
      If r_4 > 1.0 is stable under all four perturbations, classify the
      point as "convergence failure" (cause label 1). If it flips under at
      least one perturbation, classify it as "truncation artefact" (cause
      label 4).

    DG-4 verdict logic:
      - PASS requires at least one alpha_j classified "convergence failure".
      - FAIL is admissible if the runner completes and no alpha_j is
        classified "convergence failure"; the result notes must record
        cause "no-failure-found-in-frozen-range" and route to a D2
        supersedure with an extended frozen range, not an in-place edit
        of this card.
      - CONDITIONAL is admissible if all failing candidates are classified
        as "truncation artefact" under the reproducibility perturbations.

    Audit-completeness requirement:
      The result JSON written via reporting.benchmark_card.write_dg4_result_json
      must persist:
        - per-alpha r_4_baseline and classification;
        - per-alpha-per-perturbation r_4;
        - per-perturbation Path B fit residual + dissipator-norm coefficients;
        - alpha_crit interpolation if a passing/failing transition exists
          inside the frozen range.

    Method note:
      The L_4 source is the Path B numerical Richardson extraction at
      benchmarks.numerical_tcl_extraction.path_b_dissipator_norm_coefficients
      with the v0.1.2 picture transform applied. Path A (Companion Sec. IV
      analytic) remains preferred for machine-precision L_4 evaluation and
      future cross-validation; once it lands, the runner can switch to the
      cbg analytic path. Path B carries a documented finite-environment
      extraction floor (see logbook/2026-05-06_dg-4-path-b-pilot-result.md);
      verdicts at this version are subject to that uncertainty band.

# ─── Result block ─────────────────────────────────────────────────────────────

result:
  verdict: "PASS"
  evidence:
    - "benchmarks/results/D1_failure-envelope-convergence_v0.1.2_result.json"
  commit_hash: "6f887877ae72ca293a4ec6f20a212e4bed757e40"
  runner_version: "0.1.0"
  notes: |
    Verdict computed by reporting.benchmark_card.run_card through the DG-4
    sweep runner _run_dg4_sweep, consuming
    benchmarks.numerical_tcl_extraction.path_b_dissipator_norm_coefficients
    as the L_4 source. The interaction-picture transform
    transform_to_interaction_picture is applied to Lambda_2, Lambda_4
    before the order-4 extraction, fixing the v0.1.1 picture defect.

    Full frozen Phase D run (consumes the d67b453..5441467 repair
    commits):
      * runner wall time: ~37 s on the steward laptop
      * runner_version: 0.1.0

    Baseline Path B fit (interaction-picture transformed):
      * alpha_values = (0.01, 0.015, 0.02, 0.025, 0.03)
      * n_bath_modes = 4
      * n_levels_per_mode = 3
      * fit_relative_residual = 3.217e-05
      * <||L_2^dis||>_t = 2.742e+01
      * <||L_4^dis||>_t = 1.300e+03
      * coefficient ratio <||L_4^dis||>_t / <||L_2^dis||>_t = 4.742e+01

    Per-perturbation coefficient ratios (all four operational under v0.1.2):
      * upper_cutoff_factor=20: 4.968e+01
      * upper_cutoff_factor=40: 4.631e+01
      * omega_c=9.0: 5.264e+01
      * omega_c=11.0: 4.147e+01

    DG-4 PASS condition met: all 20 frozen coupling_strength sweep points
    classified as convergence_failure under the parity-aware ratio
    r_4 = coupling_strength * coefficient_ratio, with stability across
    all four reproducibility perturbations. Maximum baseline r_4 was
    4.742e+01 against threshold 1.0; the same point under the most
    favourable perturbation (omega_c=11.0) gives r_4 = 4.147e+01,
    comfortably above threshold.

    No alpha_crit is bracketed inside the frozen sweep range. Because
    the first swept point already classifies as convergence_failure, the
    boundary lies below coupling_strength = 0.05 under this Path B run.

    Per-alpha + per-perturbation audit-complete sweep table is persisted
    in
    benchmarks/results/D1_failure-envelope-convergence_v0.1.2_result.json
    via reporting.benchmark_card.write_dg4_result_json.

    Caveat: this remains a numerical-L_4 verdict. Path B carries the
    documented finite-env extraction floor from the 2026-05-06 sigma_z
    thermal zero-oracle pilot (~few * 1e-2 at the default truncation).
    Analytic Path A (Companion Sec. IV closed form for L_4) remains
    pending and is preferred for machine-precision order-4 cross-
    validation.

